# pipeline_params.yaml
# Configuration parameters for dual-arm synchronized trajectory pipeline

dual_arm_pipeline:
  ros__parameters:
    # Robot base positions
    robot1_base_y: 0.5      # meters
    robot2_base_y: -0.5     # meters
    
    # Collision detection
    collision_threshold: 0.15     # meters
    safety_margin: 0.02           # meters
    
    # Hierarchical collision detection
    hierarchical_max_depth: 5     # 1→2→4→8→16→32 segments
    samples_per_segment: 20       # samples per segment
    
    # RRT-Connect parameters
    rrt_max_iterations: 5000
    rrt_step_size: 0.1            # radians
    rrt_goal_bias: 0.1            # probability
    rrt_rewire_radius: 0.5        # radians (for RRT*)
    rrt_num_warm_samples: 20
    
    # RRT cost weights
    rrt_deviation_weight: 1.0     # weight for deviation from failed path
    rrt_length_weight: 1.0        # weight for path length
    
    # Informed RRT*
    use_informed_sampling: true
    
    # B-spline trajectory
    bspline_degree: 3             # cubic B-splines
    trajectory_duration: 10.0     # seconds
    
    # Trajectory smoothing
    smoothness_weight: 1.0
    deviation_weight: 10.0
    num_smoothing_iterations: 3
    parabolic_blend_radius: 0.1   # radians
    
    # Trajectory execution
    control_rate: 100.0           # Hz
    position_tolerance: 0.01      # radians
    velocity_tolerance: 0.1       # rad/s
    
    # IK solver
    ik_accuracy_threshold: 0.02   # 2cm
    max_ik_solutions: 8
    
    # Joint limits (Doosan M1013)
    joint_limits:
      joint1: [-3.14159, 3.14159]    # ±180°
      joint2: [-1.91986, 1.91986]    # ±110°
      joint3: [-2.26893, 2.26893]    # ±130°
      joint4: [-6.28319, 6.28319]    # ±360°
      joint5: [-2.09440, 2.09440]    # ±120°
      joint6: [-6.28319, 6.28319]    # ±360°
    
    # Joint velocity limits (rad/s)
    joint_velocity_limits: [2.0, 2.0, 2.0, 3.0, 3.0, 3.0]
    
    # Joint acceleration limits (rad/s²)
    joint_acceleration_limits: [5.0, 5.0, 5.0, 8.0, 8.0, 8.0]
    
    # Joint jerk limits (rad/s³)
    joint_jerk_limits: [20.0, 20.0, 20.0, 30.0, 30.0, 30.0]
    
    # Workspace bounds [x_min, x_max, y_min, y_max, z_min, z_max]
    workspace_bounds: [-0.8, 0.8, -1.0, 1.0, 0.0, 1.0]
    
    # Logging
    log_level: 'info'  # 'debug', 'info', 'warning', 'error'
    
    # Visualization
    enable_visualization: true
    marker_scale: 0.02


    # controllers.yaml (load via controller_manager params)
dsr_position_controller:
  type: position_controllers/JointGroupPositionController   # or forward_command_controller if needed

  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:   # ← these are the real PID values now
      joint_1: {p: 50.0, i: 0.5, d: 5.0}
      joint_2: {p: 50.0, i: 0.5, d: 5.0}
      joint_3: {p: 40.0, i: 0.3, d: 4.0}
      joint_4: {p: 30.0, i: 0.2, d: 3.0}
      joint_5: {p: 25.0, i: 0.0,  d: 2.0}
      joint_6: {p: 20.0, i: 0.0,  d: 1.5}